        fill="none" stroke="#e2e8f0" stroke-width="0.8"/>

  <!-- Drain at bottom center of basin -->
  <circle cx="45" cy="41" r="2" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <line x1="45" y1="39.5" x2="45" y2="42.5" stroke="#94a3b8" stroke-width="0.8"/>

  <!-- Feet -->
  <rect x="10" y="42" width="13" height="7" rx="3.5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="0.8"/>
  <rect x="67" y="42" width="13" height="7" rx="3.5" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="0.8"/>

