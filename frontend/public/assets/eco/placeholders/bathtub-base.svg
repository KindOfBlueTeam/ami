<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 55" aria-hidden="true">

  <!-- Faucet crossbar -->
  <rect x="36" y="4" width="18" height="4" rx="2" fill="#cbd5e1"/>
